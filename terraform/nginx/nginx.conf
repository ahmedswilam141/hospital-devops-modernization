# =============================================================================
# nginx.conf
# Role: Single entry point for the entire hospital application.
#
# ROUTING LOGIC:
#   /           → frontend container (patient portal, doctor portal)
#   /admin/     → backend container  (admin panel — doctor/patient management)
#   /health     → nginx itself       (used by load balancer health checks)
#
# WHY THIS MATTERS FOR YOUR PROJECT:
# In production (K8s + AWS ALB), this Nginx config becomes your Ingress rule.
# Traffic from the internet hits the ALB, which forwards to Nginx, which
# decides which container handles the request. One public IP, two services.
# This is how production systems handle routing without exposing internal
# container ports directly.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    # JSON format makes logs parseable by Loki/CloudWatch without extra config.
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream":"$upstream_addr",'
            '"upstream_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript text/xml;

    # ── Security headers ──────────────────────────────────────────────────────
    server_tokens      off;    # Don't reveal nginx version in error pages
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Prevents brute-force on the login endpoints.
    # 10 requests/second per IP, burst of 20 before returning 429.
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/s;

    # ── Upstream definitions ──────────────────────────────────────────────────
    # These names match the service names in docker-compose.yml exactly.
    # In K8s, these become ClusterIP service names in the hospital namespace.

    upstream frontend_app {
        server frontend:80;
        keepalive 16;
    }

    upstream backend_app {
        server backend:80;
        keepalive 16;
    }

    # =========================================================================
    # Main server block
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # Maximum upload size — must match php-uploads.ini post_max_size
        client_max_body_size 25M;

        # ── Nginx self health check ───────────────────────────────────────────
        # Hit by: AWS ALB target group health checks, K8s liveness probe on
        # the Nginx deployment, and your chaos-test.sh script.
        location = /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── Prometheus metrics stub ───────────────────────────────────────────
        # nginx-prometheus-exporter scrapes /stub_status to generate metrics.
        # Prometheus then scrapes the exporter. This is how you get request
        # rate, error rate, and connection counts into Grafana.
        location = /stub_status {
            stub_status;
            allow 127.0.0.1;       # only allow from within the container
            allow 10.0.0.0/8;      # allow from K8s pod CIDR
            deny all;
        }

        # ── Admin portal — Backend container ─────────────────────────────────
        # All URLs starting with /admin/ are proxied to the backend container.
        # The original Backend/ folder is served at the root of that container,
        # so /admin/Admin.php → backend:80/Admin.php (strip the /admin prefix).
        location /admin/ {
            # Rate-limit login endpoint specifically
            location /admin/logincheck.php {
                limit_req zone=login_limit burst=5 nodelay;
                proxy_pass http://backend_app/logincheck.php;
                include /etc/nginx/proxy_params;
            }

            proxy_pass http://backend_app/;
            include /etc/nginx/proxy_params;

            # Large uploads (PDFs) need longer timeouts
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Patient login rate limit ──────────────────────────────────────────
        location = /p_logincheck.php {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://frontend_app;
            include /etc/nginx/proxy_params;
        }

        # ── Doctor login rate limit ───────────────────────────────────────────
        location = /d_logincheck.php {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://frontend_app;
            include /etc/nginx/proxy_params;
        }

        # ── Frontend (patient + doctor portal) ────────────────────────────────
        # Everything else goes to the frontend container.
        location / {
            proxy_pass http://frontend_app;
            include /etc/nginx/proxy_params;

            # File upload timeout for report/image uploads from frontend
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Static file caching ───────────────────────────────────────────────
        # CSS, JS, and images are served with cache headers.
        # Reduces load on PHP containers for assets that never change.
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff|woff2)$ {
            proxy_pass http://frontend_app;
            include /etc/nginx/proxy_params;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Block sensitive files ─────────────────────────────────────────────
        # The original repo has .sublime-workspace files and raw PHP config.
        # These should never be served over HTTP.
        location ~* \.(sublime-workspace|sublime-project|git|env|ini)$ {
            deny all;
            return 404;
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}