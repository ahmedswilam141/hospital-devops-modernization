; =============================================================================
; php-uploads.ini
; Increases PHP upload limits for the Backend (admin) container.
;
; The original app uploads:
;   - Patient/doctor profile photos (JPG) — typically under 2MB
;   - Patient medical report PDFs       — can be 5–20MB
;
; Default PHP limits (2MB upload, 8MB post) are too small for medical PDFs.
; These values match what the original app was designed to handle.
; =============================================================================

[PHP]
upload_max_filesize = 20M
post_max_size       = 25M
max_execution_time  = 60
max_input_time      = 60
memory_limit        = 128M