# =============================================================================
# ansible/inventory.ini
#
# WHAT THIS IS:
#   Ansible inventory file — tells Ansible which servers to configure.
#   After Terraform creates the bastion, paste the public IP here.
#
# UPDATE AFTER TERRAFORM APPLY:
#   Replace BASTION_PUBLIC_IP with the value from: terraform output bastion_public_ip
# =============================================================================

[bastion]
BASTION_PUBLIC_IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/hospital-key.pem

[bastion:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
