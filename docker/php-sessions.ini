; =============================================================================
; php-sessions.ini
; Redirects PHP session storage from the container filesystem to Redis.
;
; WHY THIS MATTERS:
; By default PHP writes session files to /tmp/sess_XXXXX inside the container.
; When Kubernetes runs 2 replicas of this app, each container has its own /tmp.
; A user who logs in on pod-A gets a session file in pod-A's /tmp.
; If the next request is routed to pod-B (which it will be), pod-B has no
; session file for this user — they are immediately logged out.
;
; Redis is a shared external store. Both pods read and write sessions to the
; same Redis instance. The user stays logged in regardless of which pod
; handles their request. This is the correct production solution.
; =============================================================================

[Session]
session.save_handler    = redis

; REDIS_HOST is injected as an environment variable in docker-compose.yml
; and as a K8s ConfigMap in production.
; The ${REDIS_HOST} syntax is resolved by PHP at runtime.
session.save_path       = "tcp://${REDIS_HOST}:6379"

; Session lifetime: 1 hour of inactivity before expiry
session.gc_maxlifetime  = 3600

; Secure cookie settings
session.cookie_httponly = 1
session.use_strict_mode = 1