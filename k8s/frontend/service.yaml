# =============================================================================
# k8s/frontend/service.yaml
#
# WHAT THIS IS:
#   A Kubernetes Service — a stable internal DNS name and IP for the frontend pods.
#   Pods come and go (crash, redeploy, scale). Their IPs change every time.
#   A Service has a permanent ClusterIP and name ("frontend" in namespace "hospital")
#   that always routes to whatever pods are currently healthy.
#
# WHY ClusterIP (not LoadBalancer):
#   Frontend pods are NOT directly exposed to the internet.
#   Traffic flows: Internet → ALB → Nginx pod → frontend Service → frontend pods
#   Only Nginx needs to reach the frontend Service. ClusterIP is internal-only.
#   This matches the Docker Compose design where only nginx published port 80.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hospital
  labels:
    app: frontend
spec:
  type: ClusterIP   # internal only — nginx proxies to this
  selector:
    app: frontend   # routes to all pods with this label
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
