# =============================================================================
# k8s/nginx/deployment.yaml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: hospital
  labels:
    app: nginx
    component: reverse-proxy
spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: nginx
        component: reverse-proxy

    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          imagePullPolicy: Always

          ports:
            - containerPort: 80
              name: http

          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
