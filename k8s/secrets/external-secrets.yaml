# =============================================================================
# k8s/secrets/external-secrets.yaml
#
# WHAT THIS IS:
#   Configuration for the External Secrets Operator (ESO).
#   ESO is a Kubernetes controller that reads secrets from AWS Secrets Manager
#   and creates native Kubernetes Secret objects from them.
#
# WHY NOT JUST KUBECTL CREATE SECRET:
#   If you run `kubectl create secret generic db-creds --from-literal=password=X`
#   that password is in your shell history, your CI logs, and your K8s etcd
#   in base64 (not encrypted — base64 is NOT encryption).
#   With ESO, the password lives only in Secrets Manager (KMS-encrypted).
#   The K8s Secret is populated at runtime and never touches your shell or logs.
#
# INSTALL ESO FIRST (run this once after connecting kubectl to EKS):
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace
#
# HOW IT WORKS:
#   SecretStore → tells ESO "use AWS Secrets Manager in us-east-1 with IRSA"
#   ExternalSecret → "fetch hospital-devops/db-credentials, create a K8s Secret"
#
# =============================================================================

# SecretStore: one per namespace, tells ESO how to authenticate to AWS
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: hospital
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: hospital-service-account
            # This service account has an IAM role annotation (IRSA)
            # that grants access to Secrets Manager

---
# ExternalSecret: pulls db-credentials from Secrets Manager → creates K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: hospital
spec:
  refreshInterval: 1h    # re-sync every hour — picks up rotated passwords
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: db-credentials   # name of the resulting K8s Secret
    creationPolicy: Owner  # ESO owns and manages this Secret
  data:
    - secretKey: DB_HOST     # key in the K8s Secret
      remoteRef:
        key: hospital-devops/db-credentials   # Secrets Manager secret name
        property: host                         # field in the JSON secret
    - secretKey: DB_USER
      remoteRef:
        key: hospital-devops/db-credentials
        property: username
    - secretKey: DB_PASS
      remoteRef:
        key: hospital-devops/db-credentials
        property: password
    - secretKey: DB_NAME
      remoteRef:
        key: hospital-devops/db-credentials
        property: dbname

---
# ServiceAccount with IRSA annotation
# The annotation links this K8s identity to an AWS IAM role
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hospital-service-account
  namespace: hospital
  annotations:
    # Replace ACCOUNT_ID and OIDC_ID with values from terraform output
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/hospital-devops-app-role
