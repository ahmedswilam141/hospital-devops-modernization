# =============================================================================
# k8s/backend/service.yaml
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: hospital
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
