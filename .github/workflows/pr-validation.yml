# =============================================================================
# .github/workflows/pr-validation.yml
#
# WHAT THIS DOES:
#   Runs on every Pull Request to main. Fast checks that catch issues before
#   they reach Jenkins (which does the full build + deploy).
#
# STAGES:
#   1. trivy-scan    — filesystem CVE scan
#   2. build-test    — docker build (no push) to catch Dockerfile errors
#   3. manifest-lint — kubeconform offline schema validation (no cluster needed)
# =============================================================================

name: PR Validation

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 — Trivy filesystem scan
  # ---------------------------------------------------------------------------
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '0'   # warn only on PRs — don't block merges for HIGH

  # ---------------------------------------------------------------------------
  # JOB 2 — Docker build test (no push)
  # Catches Dockerfile errors and broken COPY paths before Jenkins
  # ---------------------------------------------------------------------------
  build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            -t hospital-devops-frontend:test \
            -f docker/Dockerfile.frontend .

      - name: Build backend image
        run: |
          docker build \
            -t hospital-devops-backend:test \
            -f docker/Dockerfile.backend .

  # ---------------------------------------------------------------------------
  # JOB 3 — Kubernetes manifest validation
  #
  # Uses kubeconform — an offline Kubernetes manifest validator that checks
  # YAML against the real Kubernetes OpenAPI schemas WITHOUT needing a live
  # cluster. This intentionally replaces `kubectl apply --dry-run=client`,
  # which (despite the name) still tries to contact a real API server for
  # parts of its validation — something that doesn't exist on a GitHub
  # Actions runner, and which previously caused this job to fail with
  # "connection refused" errors that had nothing to do with the YAML itself.
  #
  # -ignore-missing-schemas: the External Secrets Operator custom resources
  #   (SecretStore, ExternalSecret in k8s/secrets/) are CRDs, not built-in
  #   Kubernetes types, so kubeconform has no schema for them by default.
  #   This flag skips those two gracefully instead of failing on them.
  # ---------------------------------------------------------------------------
  manifest-lint:
    name: K8s Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Validate manifests (offline schema check — no cluster needed)
        run: |
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            -kubernetes-version 1.31.0 \
            k8s/namespaces/*.yaml \
            k8s/frontend/*.yaml \
            k8s/backend/*.yaml \
            k8s/nginx/*.yaml \
            k8s/redis/*.yaml \
            k8s/secrets/*.yaml
